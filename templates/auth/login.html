<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Masuk · Usaha Bagan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);document.documentElement.style.background=t==='dark'?'#131314':'#F8F9FA';})();</script>
</head>
<body class="login-page">

<div class="login-card">
    <h1 class="login-logo">Masuk</h1>

    {% if form.errors %}
    <div class="alert alert-danger">
        <span class="material-symbols-outlined">warning</span>
        <span>Username atau password salah.</span>
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Masukkan username" autofocus required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Masukkan password" required>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn btn-primary">
            <span class="material-symbols-outlined">login</span> Masuk
        </button>
    </form>

    <p class="login-back">
        <a href="/"><span class="material-symbols-outlined">arrow_back</span> Kembali ke beranda</a>
    </p>
</div>

</body>
</html>
