<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F8F9FA">
    <title>Masuk · Usaha Bagan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-page">

<div class="login-card">
    <div class="text-center mb-4">
        <span class="material-symbols-outlined" style="font-size: 2.5rem; color: var(--brand);">water</span>
        <div class="login-logo">SI Usaha Bagan</div>
        <div class="login-subtitle">Masuk untuk melanjutkan</div>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger">
        <span class="material-symbols-outlined">warning</span>
        <span>Username atau password salah.</span>
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Masukkan username" autofocus required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Masukkan password" required>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn btn-primary">
            <span class="material-symbols-outlined">login</span> Login
        </button>
    </form>
</div>

</body>
</html>
