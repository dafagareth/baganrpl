<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#F8F9FA" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#131314" media="(prefers-color-scheme: dark)">
  <meta name="description" content="{% block meta_description %}Sistem manajemen armada kapal bagan. Pencatatan operasional, hasil tangkap, dan laporan keuangan harian.{% endblock %}">
  <meta property="og:title" content="{% block og_title %}Usaha Bagan{% endblock %}">
  <meta property="og:type" content="website">

  <title>{% block title %}Usaha Bagan{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" rel="stylesheet">

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  {# Gaya khusus halaman publik (sebelumnya <style> inline) — dipecah ke public.css #}
  <link rel="stylesheet" href="{% static 'css/public.css' %}">

  <!-- Terapkan tema tersimpan sebelum halaman dirender, supaya tidak berkedip -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || t === 'light') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {}
    })();
  </script>

  {% block extra_head %}{% endblock %}
</head>
<body>

  <div class="public-topbar" aria-label="Kontak">
    <div class="public-topbar-inner">
      <a href="mailto:dafagareth@gmail.com">
        <span class="material-symbols-outlined">mail</span> dafagareth@gmail.com
      </a>
      <span class="sep" aria-hidden="true"></span>
      <a href="tel:+620800000000000">
        <span class="material-symbols-outlined">call</span> +62 0800-0000-0000
      </a>
    </div>
  </div>

  <nav class="public-navbar" aria-label="Navigasi">
    <div class="public-navbar-inner">
      <a class="public-brand" href="/">Usaha Bagan</a>

      <div class="public-nav-right">
        <ul class="public-nav">
          <li><a href="/#overview">Ikhtisar</a></li>
          <li><a href="/#fleet">Armada</a></li>
          <li><a href="{% url 'disclaimer' %}">Disclaimer</a></li>
        </ul>
        <a href="{% url 'login' %}" class="btn btn-primary btn-sm">Masuk</a>
        <button type="button" id="themeToggle" class="theme-toggle" aria-label="Ganti tema" title="Ganti tema">
          <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="public-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="public-footer">
    <div class="public-footer-inner">
      <div class="public-footer-cols">
        <div>
          <h4>Usaha Bagan</h4>
          <p>Sistem manajemen armada kapal bagan. Pencatatan operasional harian, hasil tangkap, dan rekap keuangan.</p>
        </div>
        <div>
          <h4>Navigasi</h4>
          <ul>
            <li><a href="/#overview">Ikhtisar</a></li>
            <li><a href="/#fleet">Armada</a></li>
            <li><a href="/#kontak">Kontak</a></li>
          </ul>
        </div>
        <div>
          <h4>Legal</h4>
          <ul>
            <li><a href="{% url 'privasi' %}">Kebijakan privasi</a></li>
            <li><a href="{% url 'syarat' %}">Syarat &amp; ketentuan</a></li>
            <li><a href="{% url 'disclaimer' %}">Disclaimer</a></li>
            <li><a href="mailto:dafagareth@gmail.com">Kontak</a></li>
          </ul>
        </div>
      </div>

      <div class="public-footer-bottom">
        <span>&copy; {{ now_year|default:"2026" }} Usaha Bagan.</span>
      </div>

      <p class="public-disclaimer">
        Situs ini adalah sistem manajemen operasional usaha bagan untuk keperluan demo/akademik. Seluruh angka yang ditampilkan merupakan <strong>data contoh (dummy)</strong> yang disimulasikan, bukan laporan keuangan riil. Selengkapnya di <a href="{% url 'disclaimer' %}">halaman disclaimer</a>.
      </p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Tombol ganti tema: terang ⇄ gelap, pilihan disimpan di localStorage -->
  <script>
    (function () {
      var btn = document.getElementById('themeToggle');
      if (!btn) return;
      var root = document.documentElement;
      var icon = btn.querySelector('.material-symbols-outlined');

      function effective() {
        var t = root.getAttribute('data-theme');
        if (t === 'dark' || t === 'light') return t;
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark' : 'light';
      }

      function sync() {
        var dark = effective() === 'dark';
        if (icon) icon.textContent = dark ? 'light_mode' : 'dark_mode';
        var label = dark ? 'Beralih ke mode terang' : 'Beralih ke mode gelap';
        btn.setAttribute('aria-label', label);
        btn.setAttribute('title', label);
      }

      btn.addEventListener('click', function () {
        var next = effective() === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
        sync();
        // Grafik (Chart.js) tidak ikut CSS, jadi minta ia warnai ulang
        if (typeof window.__refreshChartTheme === 'function') window.__refreshChartTheme();
      });

      sync();
    })();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
