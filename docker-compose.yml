# Nama project tetap (hindari bentrok container/volume bila VPS dipakai bersama).
name: bagan

services:
  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    # Hanya diekspos ke localhost — cukup untuk Cloudflare Tunnel (cloudflared
    # berjalan di host yang sama). Tidak terekspos langsung ke internet.
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_DB: bagan
      POSTGRES_USER: bagan
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bagan123}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: bagan
      POSTGRES_USER: bagan
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bagan123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bagan -d bagan"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  media_data:
  static_data:
