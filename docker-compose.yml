services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - media_data:/app/media
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: bagan
      POSTGRES_USER: bagan
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bagan123}

volumes:
  pg_data:
  media_data:
